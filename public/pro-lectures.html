<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Lectures - Innovators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #09090b; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .input-pro { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .input-pro:focus { border-color: #00b4ff; outline: none; box-shadow: 0 0 0 2px rgba(0,180,255,0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-zinc-950/80 backdrop-blur-md border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="dashboard.html" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors text-sm font-medium">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-purple-500/10 border border-purple-500/20 text-purple-400 text-xs font-bold rounded-full mb-3 uppercase tracking-wider">
                    <i class="fas fa-star text-[10px]"></i> Premium Access
                </div>
                <h1 class="text-4xl font-bold tracking-tight mb-2">Pro <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-[#00b4ff]">Lectures</span></h1>
                <p class="text-zinc-400">Exclusive video content uploaded by top innovators.</p>
            </div>
            <button onclick="toggleAddModal()" class="px-6 py-3 bg-white text-black hover:bg-zinc-200 rounded-xl font-semibold shadow-lg transition-all flex items-center gap-2 text-sm">
                <i class="fas fa-plus"></i> Publish Lecture
            </button>
        </div>

        <div id="lecturesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card rounded-2xl overflow-hidden hover:-translate-y-1 transition-all duration-300 group">
                <div class="relative w-full aspect-video bg-zinc-900 border-b border-white/5">
                    <iframe class="absolute inset-0 w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="p-5">
                    <h3 class="text-lg font-bold leading-snug mb-2 group-hover:text-[#00b4ff] transition-colors">Advanced Machine Learning Concepts</h3>
                    <p class="text-zinc-400 text-sm line-clamp-2 mb-4">A deep dive into neural networks and how they can be applied to real world datasets...</p>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <div class="flex items-center gap-2 text-xs text-zinc-500">
                            <div class="w-6 h-6 rounded-full bg-zinc-800 flex items-center justify-center"><i class="fas fa-user text-[10px]"></i></div>
                            Dr. Smith
                        </div>
                        <span class="text-xs text-zinc-500">2 days ago</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity duration-300">
        <div class="glass-card w-full max-w-md p-6 rounded-3xl shadow-2xl relative transform transition-all scale-100">
            <button onclick="toggleAddModal()" class="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
            <h2 class="text-2xl font-bold mb-6">Add Lecture</h2>
            
            <form id="lectureForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5 uppercase tracking-wide">Title</label>
                    <input type="text" id="l-title" required class="input-pro w-full rounded-xl px-4 py-3 text-sm text-white transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5 uppercase tracking-wide">Description</label>
                    <textarea id="l-desc" required class="input-pro w-full rounded-xl px-4 py-3 text-sm text-white h-24 resize-none transition-all"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5 uppercase tracking-wide">YouTube Embed URL</label>
                    <input type="url" id="l-url" placeholder="https://www.youtube.com/embed/..." required class="input-pro w-full rounded-xl px-4 py-3 text-sm text-white transition-all">
                </div>
                <button type="submit" class="w-full bg-[#00b4ff] hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl mt-6 transition-all shadow-lg shadow-blue-500/20">
                    Publish Now
                </button>
            </form>
        </div>
    </div>
    <script>
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user._id) window.location.href = 'login.html';

    function toggleAddModal() {
        document.getElementById('addModal').classList.toggle('hidden');
    }

    document.getElementById('lectureForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('l-title').value;
        const description = document.getElementById('l-desc').value;
        const videoUrl = document.getElementById('l-url').value;

        // Convert normal youtube link to embed link if needed
        let embedUrl = videoUrl;
        if(videoUrl.includes('watch?v=')) {
            embedUrl = videoUrl.replace('watch?v=', 'embed/');
        }

        const res = await fetch('/api/lectures', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({ title, description, videoUrl: embedUrl })
        });

        if (res.ok) {
            toggleAddModal();
            loadLectures();
            document.getElementById('lectureForm').reset();
        } else {
            alert('Failed to add lecture');
        }
    });

    async function loadLectures() {
        const res = await fetch('/api/lectures');
        const lectures = await res.json();
        const grid = document.getElementById('lecturesGrid');
        grid.innerHTML = '';

        lectures.forEach(lec => {
            grid.innerHTML += `
                <div class="glass-card rounded-2xl overflow-hidden hover:-translate-y-1 transition-all duration-300 group">
                    <div class="relative w-full aspect-video bg-zinc-900 border-b border-white/5">
                        <iframe class="absolute inset-0 w-full h-full" src="${lec.videoUrl}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-5">
                        <h3 class="text-lg font-bold leading-snug mb-2 group-hover:text-[#00b4ff] transition-colors">${lec.title}</h3>
                        <p class="text-zinc-400 text-sm line-clamp-2 mb-4">${lec.description}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5 text-xs text-zinc-500">
                            <span class="bg-purple-500/10 text-purple-400 px-2 py-1 rounded font-medium">Pro</span>
                            <span>${new Date(lec.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }
    window.onload = loadLectures;
</script>

</body>
</html>
