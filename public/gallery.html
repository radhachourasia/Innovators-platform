<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Innovators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #09090b; color: white; font-family: 'Inter', sans-serif; }
        .gallery-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
        }
        .gallery-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,180,255,0.3);
            box-shadow: 0 15px 30px -10px rgba(0,180,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <header class="bg-zinc-950/80 backdrop-blur-md border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#00b4ff] to-blue-600 flex items-center justify-center">
                    <i class="fas fa-bolt text-white text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Innovators</span>
            </a>
            <div id="auth-links">
                <a href="login.html" class="text-sm font-medium text-zinc-300 hover:text-white transition-colors">Sign In</a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-16 w-full">
        <div class="text-center mb-16">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-500/10 text-blue-400 text-xs font-bold rounded-full mb-4 border border-blue-500/20">
                <i class="fas fa-globe"></i> Public Feed
            </div>
            <h1 class="text-5xl font-bold tracking-tight mb-4">Community <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#00b4ff] to-purple-500">Gallery</span></h1>
            <p class="text-zinc-400 text-lg max-w-xl mx-auto">Explore top-tier PDFs, images, and concepts approved by our community administrators.</p>
        </div>

        <div id="gallery" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        // Adjust header based on auth status
        const token = localStorage.getItem('token');
        if(token) {
            document.getElementById('auth-links').innerHTML = `<a href="dashboard.html" class="text-sm font-medium text-[#00b4ff] hover:text-blue-400 transition-colors">Go to Dashboard</a>`;
        }

        async function loadGallery() {
            try {
                const res = await fetch('/api/files/public');
                const files = await res.json();
                const container = document.getElementById('gallery');

                if(files.length === 0) {
                    container.innerHTML = `<p class="col-span-full text-center text-zinc-500 mt-10">No public files available yet.</p>`;
                    return;
                }

                container.innerHTML = files.map(file => {
                    const isPdf = file.mimeType?.includes('pdf');
                    const iconClass = isPdf ? 'fa-file-pdf text-red-400' : 'fa-image text-blue-400';
                    
                    return `
                    <div class="gallery-card rounded-2xl overflow-hidden transition-all duration-300 flex flex-col group">
                        <div class="h-48 bg-zinc-900 flex items-center justify-center text-5xl relative overflow-hidden border-b border-white/5">
                            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/50 z-10"></div>
                            <i class="fas ${iconClass} relative z-20 group-hover:scale-110 transition-transform duration-300"></i>
                        </div>
                        <div class="p-5 flex-grow flex flex-col">
                            <h3 class="font-bold text-lg leading-tight mb-2 truncate" title="${file.originalName}">${file.originalName}</h3>
                            <div class="mt-auto pt-4 border-t border-white/5 flex items-center justify-between">
                                <div class="flex items-center gap-2 text-xs text-zinc-400">
                                    <div class="w-6 h-6 rounded-full bg-zinc-800 flex items-center justify-center"><i class="fas fa-user text-[10px]"></i></div>
                                    <span class="truncate max-w-[100px]">${file.user?.name || 'Anonymous'}</span>
                                </div>
                                <button onclick="downloadFile('${file._id}')" class="w-8 h-8 rounded-full bg-white/5 hover:bg-[#00b4ff] hover:text-white flex items-center justify-center transition-colors">
                                    <i class="fas fa-download text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch(e) {
                console.error(e);
            }
        }

        async function downloadFile(fileId) {
            try {
                const res = await fetch(`/api/files/download/${fileId}`);
                if (!res.ok) throw new Error("Download failed");
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "downloaded_file";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert("Error downloading file");
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
